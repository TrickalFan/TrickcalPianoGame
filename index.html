<!DOCTYPE html>
<html lang="en-us">
  <head>
    
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | TrickcalPiano</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* 모바일 세로 모드 오버레이 */
      #portrait-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.88);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        gap: 16px;
      }
      #portrait-overlay .rotate-icon {
        font-size: 56px;
        animation: rotate-hint 2s ease-in-out infinite;
      }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      #portrait-overlay .message {
        font-size: 17px;
        opacity: 0.9;
      }
      #portrait-overlay .landscape-btn {
        margin-top: 8px;
        padding: 14px 28px;
        font-size: 15px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: transform 0.15s;
      }
      #portrait-overlay .landscape-btn:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">TrickcalPiano</div>
      </div>
    </div>

    <!-- 모바일 세로 모드 감지 오버레이 -->
    <div id="portrait-overlay">
      <div class="rotate-icon">📱</div>
      <div class="message">화면을 가로로 돌려주세요</div>
      <div class="message" style="font-size:13px; opacity:0.6;">또는 아래 버튼으로 전체화면 전환</div>
      <button class="landscape-btn" onclick="enterLandscapeFullscreen()">🔲 전체화면 (가로)</button>
    </div>

    <script>
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var canvas = document.querySelector("#unity-canvas");

      // 모바일 세로 모드 오버레이 제어
      function updatePortraitOverlay() {
        var overlay = document.getElementById('portrait-overlay');
        if (!overlay || !isMobile) return;
        if (window.innerHeight > window.innerWidth) {
          overlay.style.display = 'flex';
        } else {
          overlay.style.display = 'none';
        }
      }

      // 전체화면 + landscape 고정
      function enterLandscapeFullscreen() {
        var elem = document.documentElement;
        var requestFS = elem.requestFullscreen || elem.webkitRequestFullscreen || elem.msRequestFullscreen;
        if (requestFS) {
          requestFS.call(elem).then(function() {
            // 전체화면 진입 성공 시 landscape 고정 시도
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function(e) {
                console.log('[Orientation] lock failed:', e);
              });
            }
          }).catch(function(e) {
            console.log('[Fullscreen] request failed:', e);
          });
        }
      }

      if (isMobile) {
        window.addEventListener('resize', updatePortraitOverlay);
        window.addEventListener('orientationchange', function() {
          setTimeout(updatePortraitOverlay, 200);
        });
        // 초기 체크
        setTimeout(updatePortraitOverlay, 300);
      }

      // 전체화면 해제 시 orientation unlock
      document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement) {
          if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
          }
          setTimeout(updatePortraitOverlay, 200);
        }
      });

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/TrickcalPianoGame.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/TrickcalPianoGame.data",
        frameworkUrl: buildUrl + "/TrickcalPianoGame.framework.js",
        codeUrl: buildUrl + "/TrickcalPianoGame.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TrickcalPiano",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  if (isMobile) {
                    // 모바일: 전체화면 + landscape 고정
                    enterLandscapeFullscreen();
                  } else {
                    unityInstance.SetFullscreen(1);
                  }
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
